<style>
:root {
  --bg:       #090d16;
  --s1:       #111520;
  --s2:       #181c2e;
  --s3:       #1f2438;
  --bdr:      #272d44;
  --bdr2:     #313860;
  --txt:      #dfe2f0;
  --muted:    #7880a8;
  --dim:      #4a5278;
  --accent:   #c8a96e;
  --acc-dim:  #3a2e16;
  --green:    #5abf80;
  --green-bg: #0e2418;
  --amber:    #e8a030;
  --amber-bg: #261a08;
  --red:      #e06060;
  --red-bg:   #240e0e;
  --font-h:   'Cormorant Garamond', Georgia, serif;
  --font-b:   'DM Sans', system-ui, sans-serif;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  background: var(--bg);
  color: var(--txt);
  font-family: var(--font-b);
  font-size: 14px;
  line-height: 1.5;
  overflow-x: hidden;
}
#root { height: 100vh; display: flex; flex-direction: column; }
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: var(--s1); }
::-webkit-scrollbar-thumb { background: var(--bdr2); border-radius: 3px; }

/* ── UTILS ─────────────────────────────────────────── */
.serif { font-family: var(--font-h); }
.muted { color: var(--muted); }
.accent { color: var(--accent); }
.flex { display: flex; }
.flex-col { display: flex; flex-direction: column; }
.items-center { align-items: center; }
.justify-between { justify-content: space-between; }
.gap-1 { gap: 6px; }
.gap-2 { gap: 12px; }
.gap-3 { gap: 18px; }
.gap-4 { gap: 24px; }
.p-2 { padding: 12px; }
.p-3 { padding: 18px; }
.p-4 { padding: 24px; }
.mt-1 { margin-top: 6px; }
.mt-2 { margin-top: 12px; }
.mt-3 { margin-top: 18px; }
.mt-4 { margin-top: 24px; }
.w-full { width: 100%; }
.text-sm { font-size: 12px; }
.text-xs { font-size: 11px; }
.text-lg { font-size: 16px; }
.text-xl { font-size: 18px; }
.text-2xl { font-size: 22px; }
.font-600 { font-weight: 600; }
.font-700 { font-weight: 700; }
.rounded { border-radius: 6px; }
.rounded-lg { border-radius: 10px; }
.overflow-hidden { overflow: hidden; }
.truncate { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.cursor-pointer { cursor: pointer; }
.select-none { user-select: none; }
.opacity-0 { opacity: 0; }
.opacity-50 { opacity: 0.5; }

/* ── CARD ─────────────────────────────────────────── */
.card {
  background: var(--s1);
  border: 1px solid var(--bdr);
  border-radius: 10px;
  overflow: hidden;
}
.card-inner { padding: 18px; }

/* ── BUTTONS ────────────────────────────────────────── */
.btn {
  display: inline-flex; align-items: center; justify-content: center;
  gap: 6px; padding: 8px 16px; border-radius: 7px; border: none;
  font-family: var(--font-b); font-size: 13px; font-weight: 600;
  cursor: pointer; transition: all .15s; white-space: nowrap;
}
.btn:disabled { opacity: 0.4; cursor: not-allowed; }
.btn-primary { background: var(--accent); color: #0a0c14; }
.btn-primary:hover:not(:disabled) { background: #d8b97e; }
.btn-ghost { background: transparent; color: var(--txt); border: 1px solid var(--bdr2); }
.btn-ghost:hover:not(:disabled) { background: var(--s2); border-color: var(--muted); }
.btn-danger { background: var(--red-bg); color: var(--red); border: 1px solid #3a1a1a; }
.btn-danger:hover:not(:disabled) { background: #301010; }
.btn-sm { padding: 5px 10px; font-size: 12px; border-radius: 5px; }
.btn-xs { padding: 3px 8px; font-size: 11px; border-radius: 4px; }
.btn-icon { padding: 7px; border-radius: 6px; }

/* ── INPUTS ─────────────────────────────────────────── */
.input {
  background: var(--s2); border: 1px solid var(--bdr2); border-radius: 7px;
  color: var(--txt); font-family: var(--font-b); font-size: 14px;
  padding: 8px 12px; width: 100%; outline: none;
  transition: border-color .15s;
}
.input:focus { border-color: var(--accent); }
.input::placeholder { color: var(--dim); }
.input-sm { padding: 5px 10px; font-size: 13px; border-radius: 5px; }
.input-label { font-size: 12px; font-weight: 600; color: var(--muted); margin-bottom: 5px; letter-spacing: .5px; text-transform: uppercase; }

/* ── BADGES ─────────────────────────────────────────── */
.badge {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 3px 9px; border-radius: 20px; font-size: 11px; font-weight: 600;
}
.badge-green { background: var(--green-bg); color: var(--green); border: 1px solid #1a4030; }
.badge-amber { background: var(--amber-bg); color: var(--amber); border: 1px solid #3a2a10; }
.badge-red   { background: var(--red-bg);   color: var(--red);   border: 1px solid #3a1a1a; }
.badge-gray  { background: var(--s2);       color: var(--muted); border: 1px solid var(--bdr); }
.badge-accent{ background: var(--acc-dim);  color: var(--accent);border: 1px solid #4a3a20; }

/* ── PROGRESS BAR ───────────────────────────────────── */
.progress-track { background: var(--s3); border-radius: 99px; overflow: hidden; }
.progress-fill { height: 100%; border-radius: 99px; transition: width .4s ease; }

/* ── TABS ───────────────────────────────────────────── */
.tab-nav {
  display: flex; gap: 2px; padding: 0 24px;
  background: var(--s1); border-bottom: 1px solid var(--bdr);
  flex-shrink: 0;
}
.tab-btn {
  padding: 13px 18px; font-size: 13px; font-weight: 600; cursor: pointer;
  color: var(--muted); border: none; background: none; border-bottom: 2px solid transparent;
  transition: all .15s; margin-bottom: -1px; white-space: nowrap;
}
.tab-btn:hover { color: var(--txt); }
.tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }

/* ── HEADER ─────────────────────────────────────────── */
.app-header {
  background: var(--s1); border-bottom: 1px solid var(--bdr);
  padding: 12px 24px; display: flex; align-items: center;
  justify-content: space-between; flex-shrink: 0;
  gap: 16px;
}
.header-title { font-family: var(--font-h); font-size: 20px; font-weight: 700; color: var(--accent); letter-spacing: .3px; }
.header-countdown { text-align: center; }
.countdown-num { font-family: var(--font-h); font-size: 28px; font-weight: 700; line-height: 1; color: var(--txt); }
.countdown-label { font-size: 10px; font-weight: 600; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; }

/* ── MAIN CONTENT ───────────────────────────────────── */
.tab-content { flex: 1; overflow-y: auto; padding: 24px; }
.content-grid { display: grid; gap: 18px; }
.grid-2 { grid-template-columns: 1fr 1fr; }
.grid-3 { grid-template-columns: 1fr 1fr 1fr; }

/* ── SETUP WIZARD ───────────────────────────────────── */
.wizard-outer {
  min-height: 100vh; display: flex; align-items: flex-start; justify-content: center;
  padding: 40px 16px; background: var(--bg);
  background-image: radial-gradient(ellipse at 20% 20%, #1a1530 0%, transparent 50%),
                    radial-gradient(ellipse at 80% 80%, #0e1a28 0%, transparent 50%);
}
.wizard-box {
  width: 100%; max-width: 720px; background: var(--s1);
  border: 1px solid var(--bdr); border-radius: 14px; overflow: hidden;
}
.wizard-header { padding: 28px 32px 24px; border-bottom: 1px solid var(--bdr); }
.wizard-title { font-family: var(--font-h); font-size: 26px; font-weight: 700; color: var(--accent); }
.wizard-step-dots { display: flex; gap: 8px; margin-top: 16px; }
.step-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--bdr2); transition: all .2s; }
.step-dot.active { background: var(--accent); width: 24px; border-radius: 4px; }
.step-dot.done { background: var(--green); }
.wizard-body { padding: 28px 32px; max-height: 65vh; overflow-y: auto; }
.wizard-footer { padding: 20px 32px; border-top: 1px solid var(--bdr); display: flex; justify-content: space-between; align-items: center; }

/* ── CHAPTER CARDS (Syllabus) ─────────────────────────── */
.chapter-card {
  background: var(--s1); border: 1px solid var(--bdr);
  border-radius: 8px; margin-bottom: 6px; overflow: hidden;
  transition: border-color .15s;
}
.chapter-card:hover { border-color: var(--bdr2); }
.chapter-card.expanded { border-color: var(--bdr2); }
.ch-card-top {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 14px; cursor: pointer;
}
.ch-card-expand { padding: 12px 14px 14px; border-top: 1px solid var(--bdr); background: var(--s2); }
.ch-status-pill {
  display: inline-flex; align-items: center; padding: 2px 8px; border-radius: 20px;
  font-size: 11px; font-weight: 600; flex-shrink: 0;
}
.status-none    { background: var(--s3); color: var(--dim); border: 1px solid var(--bdr); }
.status-ip      { background: #1a2840; color: #6090d0; border: 1px solid #2a3a5a; }
.status-done    { background: var(--green-bg); color: var(--green); border: 1px solid #1a4030; }
.status-rev-none { background: #261830; color: #a060c0; border: 1px solid #3a2048; }
.status-rev-ip  { background: #1a1a3a; color: #8080e0; border: 1px solid #2a2a5a; }
.status-skip    { background: #1a1a1a; color: var(--dim); border: 1px solid var(--bdr); }

.track-btns { display: flex; gap: 5px; }
.track-btn {
  padding: 4px 10px; border-radius: 5px; font-size: 12px; font-weight: 600;
  cursor: pointer; border: 1px solid var(--bdr2); background: var(--s3);
  color: var(--muted); transition: all .12s;
}
.track-btn.active-study   { background: #0e2040; color: #6090d0; border-color: #2a4060; }
.track-btn.active-revision{ background: #200e30; color: #a060c0; border-color: #3a1a50; }
.track-btn.active-skip    { background: var(--s3); color: var(--dim); border-color: var(--bdr); }

.status-btns { display: flex; gap: 5px; flex-wrap: wrap; }
.status-btn {
  padding: 4px 10px; border-radius: 5px; font-size: 12px; font-weight: 600;
  cursor: pointer; border: 1px solid var(--bdr2); background: var(--s3);
  color: var(--muted); transition: all .12s;
}
.status-btn.sel-none  { background: var(--s3);   color: var(--dim);    border-color: var(--bdr); }
.status-btn.sel-ip    { background: #0e2040; color: #6090d0; border-color: #2a4060; }
.status-btn.sel-done  { background: var(--green-bg); color: var(--green); border-color: #1a4030; }

/* ── SUBJECT SUBJECT LABEL ────────────────────────────── */
.subject-section-header {
  display: flex; align-items: center; gap: 10px;
  padding: 16px 0 8px; font-family: var(--font-h); font-size: 17px;
  font-weight: 700; color: var(--txt); border-bottom: 1px solid var(--bdr); margin-bottom: 10px;
}
.subject-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }

/* ── RANGE SLIDER ────────────────────────────────────── */
.slider { width: 100%; accent-color: var(--accent); cursor: pointer; height: 4px; }

/* ── LOADING / SIGN-IN ────────────────────────────────── */
.center-screen {
  min-height: 100vh; display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 16px;
  background: var(--bg);
  background-image: radial-gradient(ellipse at 30% 30%, #14102a 0%, transparent 60%),
                    radial-gradient(ellipse at 70% 70%, #0c1824 0%, transparent 60%);
  padding: 24px;
}
.center-title { font-family: var(--font-h); font-size: 36px; font-weight: 700; color: var(--accent); }

/* ── SUGGESTION CARDS ────────────────────────────────── */
.suggestion-card {
  background: var(--s2); border: 1px solid var(--bdr); border-radius: 8px;
  padding: 12px 14px; cursor: pointer; transition: border-color .15s;
  border-left: 3px solid var(--accent);
}
.suggestion-card:hover { border-color: var(--accent); }

/* ── SUBJECT BALANCE BARS ────────────────────────────── */
.subject-balance-row { margin-bottom: 10px; }
.balance-label { font-size: 12px; font-weight: 600; margin-bottom: 4px; display: flex; justify-content: space-between; }
.balance-bar-bg { background: var(--s3); border-radius: 3px; height: 8px; position: relative; overflow: visible; }
.balance-bar-fill { height: 8px; border-radius: 3px; transition: width .4s; }

/* ── CHART CONTAINER ─────────────────────────────────── */
.chart-wrap { position: relative; padding: 0; }
.chart-wrap canvas { max-height: 280px; }

/* ── STATS SESSION LOG ────────────────────────────────── */
.log-table { width: 100%; border-collapse: collapse; font-size: 12px; }
.log-table th { padding: 8px 12px; background: var(--s2); color: var(--muted); text-align: left; font-size: 11px; letter-spacing: .5px; text-transform: uppercase; font-weight: 600; border-bottom: 1px solid var(--bdr); }
.log-table td { padding: 8px 12px; border-bottom: 1px solid var(--bdr); }
.log-table tr:last-child td { border-bottom: none; }

/* ── HOLIDAY TAGS ────────────────────────────────────── */
.holiday-tag { display: inline-flex; align-items: center; gap: 6px; padding: 4px 10px; background: var(--s2); border: 1px solid var(--bdr2); border-radius: 20px; font-size: 12px; margin: 3px; }
.holiday-remove { cursor: pointer; color: var(--muted); font-size: 14px; line-height: 1; }
.holiday-remove:hover { color: var(--red); }

/* ── MISC ─────────────────────────────────────────────── */
.divider { height: 1px; background: var(--bdr); margin: 16px 0; }
.group-label { font-size: 10px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: var(--muted); padding: 12px 0 6px; }
.sync-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--green); display: inline-block; }
.sync-dot.syncing { background: var(--amber); animation: pulse 1s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

/* ── EMPTY STATE ─────────────────────────────────────── */
.empty-state { text-align: center; padding: 48px 24px; color: var(--muted); }
.empty-icon { font-size: 36px; margin-bottom: 12px; }

/* ── RESPONSIVE ──────────────────────────────────────── */
@media (max-width: 768px) {
  .grid-2, .grid-3 { grid-template-columns: 1fr; }
  .tab-content { padding: 16px; }
  .app-header { padding: 10px 16px; }
  .wizard-body { padding: 20px; }
  .wizard-header { padding: 20px; }
  .wizard-footer { padding: 16px 20px; }
}
</style>
</head>

/* ═══════════════════════════════════════════════════════════
   HELPER FUNCTIONS
═══════════════════════════════════════════════════════════ */
const toDateStr = d => {
  const y = d.getFullYear(), m = String(d.getMonth()+1).padStart(2,'0'), dd = String(d.getDate()).padStart(2,'0');
  return `${y}-${m}-${dd}`;
};
const todayStr = () => toDateStr(new Date());
const todayDate = () => { const d = new Date(); d.setHours(0,0,0,0); return d; };

function workingDaysBetween(startStr, endStr, holidays) {
  const hSet = new Set(holidays || []);
  let count = 0;
  const cur = new Date(startStr);
  const end = new Date(endStr);
  while (cur < end) {
    if (!hSet.has(toDateStr(cur))) count++;
    cur.setDate(cur.getDate()+1);
  }
  return count;
}

function calcSubjectWork(chapters, subjectId) {
  const chs = Object.values(chapters).filter(c => c.subject === subjectId && c.track !== 'skip');
  const total = chs.reduce((s,c) => s + (parseFloat(c.daysEstimate)||1), 0);
  const done  = chs.reduce((s,c) => {
    const p = c.status === 'done' ? 100 : (c.progress||0);
    return s + (parseFloat(c.daysEstimate)||1) * p/100;
  }, 0);
  return { total, done, remaining: total-done, count: chs.length };
}

function calcTotalWork(chapters) {
  const chs = Object.values(chapters).filter(c => c.track !== 'skip');
  const total = chs.reduce((s,c) => s + (parseFloat(c.daysEstimate)||1), 0);
  const done  = chs.reduce((s,c) => {
    const p = c.status === 'done' ? 100 : (c.progress||0);
    return s + (parseFloat(c.daysEstimate)||1) * p/100;
  }, 0);
  return { total, done, remaining: total-done };
}

function getOnTrackStatus(chapters, examDate, holidays) {
  if (!examDate || !Object.keys(chapters).length) return null;
  const t = todayStr();
  const daysLeft = workingDaysBetween(t, examDate, holidays);
  const { total, done, remaining } = calcTotalWork(chapters);
  if (daysLeft <= 0) return { status:'exam', daysLeft:0, remaining, total, done, paceNeeded: remaining };
  const paceNeeded = remaining / Math.max(1, daysLeft);
  let status = 'on-track';
  if (paceNeeded > 1.3) status = 'behind';
  else if (paceNeeded > 1.0) status = 'slight-risk';
  return { status, daysLeft, remaining, total, done, paceNeeded };
}

function getPrioritySuggestions(chapters, weaknesses, examDate) {
  if (!examDate) return [];
  const t = todayDate();
  const daysLeft = Math.max(1, Math.ceil((new Date(examDate)-t)/86400000));
  const scored = Object.entries(chapters)
    .filter(([_,c]) => c.track !== 'skip' && c.status !== 'done')
    .map(([id,c]) => {
      const prog = c.progress||0;
      const remaining = 1 - prog/100;
      const weakness = (weaknesses[c.subject]||50)/100;
      const est = parseFloat(c.daysEstimate)||1;
      // In-progress chapters get a small boost so they get finished first
      const inProgressBoost = c.status==='in-progress' ? 1.25 : 1;
      const score = weakness * remaining * est * (100/daysLeft) * inProgressBoost;
      const subj = SUBJECTS.find(s=>s.id===c.subject);
      return { id, ...c, score, remaining, subjName: subj?.name||c.subject, subjColor: subj?.color||'#444' };
    })
    .sort((a,b) => b.score-a.score);

  // Pick up to 7, max 2 per subject — round-robin across top subjects
  const out = [];
  const subjectCount = {};
  const MAX_TOTAL = 7;
  const MAX_PER_SUBJECT = 2;

  // First pass: 1 per subject (highest priority item)
  for (const ch of scored) {
    if (out.length >= MAX_TOTAL) break;
    if (!subjectCount[ch.subject]) {
      out.push(ch);
      subjectCount[ch.subject] = 1;
    }
  }
  // Second pass: allow a 2nd item per subject if we still have slots
  for (const ch of scored) {
    if (out.length >= MAX_TOTAL) break;
    if ((subjectCount[ch.subject]||0) < MAX_PER_SUBJECT && !out.find(o=>o.id===ch.id)) {
      out.push(ch);
      subjectCount[ch.subject] = (subjectCount[ch.subject]||0) + 1;
    }
  }
  // Sort final list by score descending for display
  return out.sort((a,b)=>b.score-a.score);
}

function buildBurnupData(chapters, snapshots, examDate, setupDate, holidays) {
  if (!examDate || !setupDate) return null;
  const hSet = new Set(holidays||[]);
  const start = new Date(setupDate);
  const exam  = new Date(examDate);
  const t     = todayDate();
  const { total } = calcTotalWork(chapters);
  if (!total) return null;

  const dates = [];
  const cur = new Date(start);
  while (cur <= exam) { dates.push(toDateStr(cur)); cur.setDate(cur.getDate()+1); }

  const wdTotal = workingDaysBetween(setupDate, examDate, holidays);
  let wdPassed = 0;
  const targetLine = dates.map(d => {
    if (!hSet.has(d)) wdPassed++;
    return Math.min(total, (wdPassed / Math.max(1, wdTotal)) * total);
  });

  const currentDone = Object.values(chapters).filter(c=>c.track!=='skip')
    .reduce((s,c) => { const p=c.status==='done'?100:(c.progress||0); return s+(parseFloat(c.daysEstimate)||1)*p/100; },0);
  const tStr = todayStr();
  const allSnaps = { ...(snapshots||{}), [tStr]: { total: currentDone } };

  let last = 0;
  const actualLine = dates.map(d => {
    if (new Date(d) > t) return null;
    if (allSnaps[d] !== undefined) last = allSnaps[d].total;
    return parseFloat(last.toFixed(2));
  });

  return { dates, targetLine, actualLine, total };
}

function buildSubjectBurnupData(chapters, snapshots, examDate, setupDate, holidays, subjectId) {
  if (!examDate || !setupDate) return null;
  const hSet = new Set(holidays||[]);
  const start = new Date(setupDate);
  const exam  = new Date(examDate);
  const t     = todayDate();
  const { total } = calcSubjectWork(chapters, subjectId);
  if (!total) return null;

  const dates = [];
  const cur = new Date(start);
  while (cur <= exam) { dates.push(toDateStr(cur)); cur.setDate(cur.getDate()+1); }

  const wdTotal = workingDaysBetween(setupDate, examDate, holidays);
  let wdPassed = 0;
  const subjectFraction = total / Math.max(0.001, calcTotalWork(chapters).total);
  const targetLine = dates.map(d => {
    if (!hSet.has(d)) wdPassed++;
    return Math.min(total, (wdPassed/Math.max(1,wdTotal))*total);
  });

  const currentDone = Object.values(chapters)
    .filter(c=>c.subject===subjectId && c.track!=='skip')
    .reduce((s,c)=>{ const p=c.status==='done'?100:(c.progress||0); return s+(parseFloat(c.daysEstimate)||1)*p/100; },0);

  const tStr = todayStr();
  let last = 0;
  const actualLine = dates.map(d => {
    if (new Date(d) > t) return null;
    const snap = (snapshots||{})[d];
    if (snap?.bySubject?.[subjectId] !== undefined) last = snap.bySubject[subjectId];
    else if (d === tStr) last = currentDone;
    return parseFloat(last.toFixed(2));
  });

  return { dates, targetLine, actualLine, total };
}

function takeSnapshot(chapters) {
  const total = Object.values(chapters).filter(c=>c.track!=='skip')
    .reduce((s,c)=>{ const p=c.status==='done'?100:(c.progress||0); return s+(parseFloat(c.daysEstimate)||1)*p/100; },0);
  const bySubject = {};
  SUBJECTS.forEach(sub => {
    bySubject[sub.id] = Object.values(chapters)
      .filter(c=>c.subject===sub.id && c.track!=='skip')
      .reduce((s,c)=>{ const p=c.status==='done'?100:(c.progress||0); return s+(parseFloat(c.daysEstimate)||1)*p/100; },0);
  });
  return { total: parseFloat(total.toFixed(3)), bySubject };
}

/* ═══════════════════════════════════════════════════════════
   BURNUP CHART COMPONENT
═══════════════════════════════════════════════════════════ */
function BurnupChart({ data, color, title }) {
  const canvasRef = useRef(null);
  const chartInst = useRef(null);

  useEffect(() => {
    if (!canvasRef.current || !data) return;
    if (chartInst.current) { chartInst.current.destroy(); chartInst.current = null; }
    const { dates, targetLine, actualLine, total } = data;
    // Show every Nth label to avoid crowding
    const N = Math.max(1, Math.floor(dates.length/10));
    const labels = dates.map((d,i) => (i%N===0) ? d.slice(5) : '');

    chartInst.current = new Chart(canvasRef.current, {
      type: 'line',
      data: {
        labels,
        datasets: [
          { label:'Scope', data: dates.map(()=>total),
            borderColor:'#2d3352', borderWidth:1, borderDash:[6,4],
            pointRadius:0, fill:false, tension:0 },
          { label:'Target Pace', data: targetLine,
            borderColor:'#c8a96e', borderWidth:1.5, borderDash:[4,3],
            pointRadius:0, fill:false, tension:0 },
          { label:'Actual Progress', data: actualLine,
            borderColor: color||'#5abf80',
            backgroundColor: (color||'#5abf80')+'22',
            borderWidth:2, pointRadius:0, fill:true, tension:0.3,
            spanGaps: false },
        ]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        interaction: { mode:'index', intersect:false },
        scales: {
          x: { grid:{color:'#1e2438'}, ticks:{color:'#555e80',maxRotation:0,font:{size:10}}, border:{color:'#1e2438'} },
          y: { min:0, max: Math.ceil(total*1.05), grid:{color:'#1e2438'},
               ticks:{color:'#555e80',font:{size:10}}, border:{color:'#1e2438'} }
        },
        plugins: {
          legend:{ labels:{ color:'#8890b0', boxWidth:14, font:{size:11}, padding:16 } },
          tooltip:{ backgroundColor:'#1a1d2e', titleColor:'#e2e4f0', bodyColor:'#8890b0',
                    borderColor:'#2a3050', borderWidth:1 }
        }
      }
    });
    return () => { if (chartInst.current) { chartInst.current.destroy(); chartInst.current=null; } };
  }, [data, color]);

  return (
    <div>
      {title && <div className="font-600 text-sm muted" style={{marginBottom:10}}>{title}</div>}
      <div className="chart-wrap" style={{height:240}}>
        <canvas ref={canvasRef} />
      </div>
    </div>
  );
}

  const track  = ch.track||'study';

    if (track==='revision') {
      if (status==='not-started') return ['Not Revised','status-rev-none'];
      if (status==='in-progress') return ['In Revision','status-rev-ip'];
      return ['Revised ✓','status-done'];
    }
    if (status==='not-started') return ['Not Started','status-none'];
    if (status==='in-progress') return ['In Progress','status-ip'];
    return ['Done ✓','status-done'];
  };
  const [label, cls] = statusLabel();
  if (track==='skip') return (
    <div className="chapter-card" style={{opacity:0.4}}>
      <div className="ch-card-top" onClick={()=>setOpen(!open)}>
        <span className="ch-status-pill status-skip">Skip</span>
        <span style={{flex:1,fontSize:13}}>{ch.name}</span>
        <span className="muted text-xs">{ch.daysEstimate||1}d</span>
        <span className="muted" style={{marginLeft:6}}>{open?'▲':'▼'}</span>
      </div>
      {open && (
        <div className="ch-card-expand">
          <div className="flex gap-2 items-center">
            <span className="input-label" style={{margin:0}}>Track:</span>
            <div className="track-btns">
              {['study','revision','skip'].map(t=>(
                <button key={t} className={`track-btn ${ch.track===t?`active-${t}`:''}`}
                  onClick={()=>onUpdate(chId,{track:t,status:'not-started',progress:0})}>
                  {t==='study'?'📚 Study':t==='revision'?'🔄 Revision':'⏭️ Skip'}
                </button>
              ))}
            </div>
          </div>
        </div>
      )}
    </div>
  );

  const completionPct = status==='done' ? 100 : (ch.progress||0);
  return (
    <div className={`chapter-card${open?' expanded':''}`}>
      <div className="ch-card-top" onClick={()=>setOpen(!open)}>
        <span className="ch-status-pill" style={{fontSize:11}}
          dangerouslySetInnerHTML={{__html:''}} >
        </span>
        <span className={`ch-status-pill ${cls}`}>{label}</span>
        <span style={{flex:1,fontSize:13,marginLeft:4}}>{ch.name}</span>
        {status==='in-progress' && completionPct>0 && (
          <span style={{fontSize:11,color:'#6090d0',marginRight:4}}>{completionPct}%</span>
        )}
        <span className="muted text-xs">{ch.daysEstimate||1}d</span>
        <span className="muted" style={{marginLeft:8}}>{open?'▲':'▼'}</span>
      </div>
      {status!=='not-started' && status!=='done' && (
        <div className="progress-track" style={{height:3,borderRadius:0,marginTop:-1}}>
          <div className="progress-fill" style={{width:`${completionPct}%`,background:subColor||'#5abf80',borderRadius:0}} />
        </div>
      )}
      {status==='done' && (
        <div style={{height:3,background:subColor||'#5abf80',borderRadius:0}}/>
      )}
      {open && (
        <div className="ch-card-expand flex-col gap-2">
          {/* Track */}
          <div className="flex gap-2 items-center flex-wrap">
            <span className="input-label" style={{margin:0,flexShrink:0}}>Track:</span>
            <div className="track-btns">
              {['study','revision','skip'].map(t=>(
                <button key={t} className={`track-btn ${track===t?`active-${t}`:''}`}
                  onClick={()=>onUpdate(chId,{track:t,status:'not-started',progress:0})}>
                  {t==='study'?'📚 Study':t==='revision'?'🔄 Revision':'⏭️ Skip'}
                </button>
              ))}
            </div>
          </div>
          {/* Status */}
          <div className="flex gap-2 items-center flex-wrap">
            <span className="input-label" style={{margin:0,flexShrink:0}}>Status:</span>
            <div className="status-btns">
              {['not-started','in-progress','done'].map(s=>{
                const sLabels = track==='revision'
                  ? {['not-started']:'Not Revised',['in-progress']:'In Revision',['done']:'Revised ✓'}
                  : {['not-started']:'Not Started',['in-progress']:'In Progress',['done']:'Done ✓'};
                return (
                  <button key={s} className={`status-btn ${status===s?`sel-${s==='not-started'?'none':s==='in-progress'?'ip':'done'}`:''}`}
                    onClick={()=>onUpdate(chId,{status:s,progress:s==='done'?100:s==='not-started'?0:ch.progress||0})}>
                    {sLabels[s]}
                  </button>
                );
              })}
            </div>
          </div>
          {/* Progress (if in-progress) */}
          {status==='in-progress' && (
            <div className="flex gap-2 items-center">
              <span className="input-label" style={{margin:0,flexShrink:0}}>Progress:</span>
              <input type="range" min="0" max="99" step="1" className="slider"
                value={localProg} onChange={e=>setLocalProg(Number(e.target.value))}
                onMouseUp={()=>onUpdate(chId,{progress:localProg})}
                onTouchEnd={()=>onUpdate(chId,{progress:localProg})} />
              <input type="number" min="0" max="99" step="0.5" className="input input-sm"
                style={{width:64}} value={localProg}
                onChange={e=>{const v=Math.min(99,Math.max(0,parseFloat(e.target.value)||0)); setLocalProg(v); onUpdate(chId,{progress:v});}} />
              <span className="muted text-sm">%</span>
            </div>
          )}
          {/* Days estimate */}
          <div className="flex gap-2 items-center">
            <span className="input-label" style={{margin:0,flexShrink:0}}>Days Est.:</span>
            <input type="number" min="0.5" step="0.5" className="input input-sm"
              style={{width:72}} defaultValue={ch.daysEstimate||1}
              onBlur={e=>onUpdate(chId,{daysEstimate:parseFloat(e.target.value)||1})} />
            <span className="muted text-sm">days</span>
          </div>
        </div>
      )}
    </div>
  );
}

/* ═══════════════════════════════════════════════════════════
   SETUP WIZARD
═══════════════════════════════════════════════════════════ */
function SetupWizard({ onComplete }) {
  const [step, setStep] = useState(0);
  const [examDate, setExamDate]   = useState('');
  const [setupDate, setSetupDate] = useState(todayStr());
  const [weaknesses, setWeaknesses] = useState(
    Object.fromEntries(SUBJECTS.map(s=>[s.id,50]))
  );
  const [chapCfg, setChapCfg] = useState(() => {
    const cfg = {};
    SUBJECTS.forEach(sub => {
      (CHAPTERS_DEFAULT[sub.id]||[]).forEach(ch => {
        cfg[ch.id] = { subject:sub.id, name:ch.name, group:ch.group,
          track:'study', status:'not-started', progress:0, daysEstimate:1 };
      });
    });
    return cfg;
  });
  const [wizSubIdx, setWizSubIdx] = useState(0);

  const curSub = SUBJECTS[wizSubIdx];
  const curChs = (CHAPTERS_DEFAULT[curSub?.id]||[]);

  const finish = () => {
    onComplete({
      examDate, setupDate: setupDate||todayStr(),
      weaknesses, chapters: chapCfg,
      snapshots: { [todayStr()]: takeSnapshot(chapCfg) }
    });
  };

  return (
    <div className="wizard-outer">
      <div className="wizard-box">
        <div className="wizard-header">
          <div className="serif" style={{fontSize:28,fontWeight:700,color:'var(--accent)'}}>SSC Exam Planner</div>
          <div className="muted text-sm mt-1">Let's set up your personalised study tracker — 3 quick steps.</div>
          <div className="wizard-step-dots">
            {[0,1,2].map(i=>(
              <div key={i} className={`step-dot ${i===step?'active':i<step?'done':''}`} />
            ))}
          </div>
        </div>

        <div className="wizard-body">
          {/* ── STEP 0: Dates ─────────────────────────── */}
          {step===0 && (
            <div>
              <div className="serif" style={{fontSize:21,fontWeight:700,marginBottom:16}}>
                Step 1 — Exam Date
              </div>
              <div className="flex-col gap-3">
                <div>
                  <div className="input-label">Exam Date</div>
                  <input type="date" className="input" value={examDate} onChange={e=>setExamDate(e.target.value)} />
                  <div className="muted text-xs mt-1">Include any buffer days you want before the real exam.</div>
                </div>
                <div>
                  <div className="input-label">Study Start Date (today by default)</div>
                  <input type="date" className="input" value={setupDate} onChange={e=>setSetupDate(e.target.value)} />
                </div>
              </div>
            </div>
          )}

          {/* ── STEP 1: Weaknesses ─────────────────────── */}
          {step===1 && (
            <div>
              <div className="serif" style={{fontSize:21,fontWeight:700,marginBottom:4}}>
                Step 2 — Subject Weakness
              </div>
              <div className="muted text-sm" style={{marginBottom:18}}>
                Set how weak you feel in each subject. Weaker subjects get higher priority in suggestions.
              </div>
              {SUBJECTS.map(sub=>(
                <div key={sub.id} style={{marginBottom:18}}>
                  <div className="flex justify-between items-center" style={{marginBottom:6}}>
                    <div className="flex items-center gap-1">
                      <div style={{width:10,height:10,borderRadius:'50%',background:sub.color,flexShrink:0}} />
                      <span className="font-600" style={{fontSize:14}}>{sub.name}</span>
                      <span className="muted text-xs" style={{marginLeft:4}}>{sub.local}</span>
                    </div>
                    <span style={{fontSize:13,fontWeight:700,color:
                      weaknesses[sub.id]>=70?'var(--red)':weaknesses[sub.id]>=40?'var(--amber)':'var(--green)'
                    }}>{weaknesses[sub.id]}%</span>
                  </div>
                  <input type="range" min="0" max="100" step="5" className="slider"
                    value={weaknesses[sub.id]}
                    onChange={e=>setWeaknesses(w=>({...w,[sub.id]:Number(e.target.value)}))} />
                </div>
              ))}
            </div>
          )}

          {/* ── STEP 2: Chapters ──────────────────────── */}
          {step===2 && (
            <div>
              <div className="serif" style={{fontSize:21,fontWeight:700,marginBottom:4}}>
                Step 3 — Chapter Configuration
              </div>
              <div className="muted text-sm" style={{marginBottom:16}}>
                For each chapter, set the track and your days estimate. Skip any chapter you won't study.
              </div>

              {/* Subject tabs */}
              <div style={{display:'flex',flexWrap:'wrap',gap:6,marginBottom:18}}>
                {SUBJECTS.map((sub,i)=>(
                  <button key={sub.id} onClick={()=>setWizSubIdx(i)}
                    style={{padding:'5px 12px',borderRadius:20,fontSize:12,fontWeight:600,cursor:'pointer',border:'1px solid',
                      background:i===wizSubIdx?sub.color:'transparent',
                      borderColor:i===wizSubIdx?sub.color:'var(--bdr2)',
                      color:i===wizSubIdx?'#fff':'var(--muted)'}}>
                    {sub.name}
                  </button>
                ))}
              </div>

              {/* Bulk defaults for this subject */}
              <div className="flex gap-2 items-center" style={{marginBottom:12,padding:'8px 12px',background:'var(--s2)',borderRadius:8,flexWrap:'wrap'}}>
                <span className="muted text-xs">Bulk set:</span>
                {['study','revision','skip'].map(t=>(
                  <button key={t} className="btn btn-ghost btn-xs"
                    onClick={()=>{
                      const u={};
                      curChs.forEach(ch=>{ u[ch.id]={...chapCfg[ch.id],track:t,status:'not-started',progress:0}; });
                      setChapCfg(c=>({...c,...u}));
                    }}>
                    {t==='study'?'📚 All Study':t==='revision'?'🔄 All Revision':'⏭️ All Skip'}
                  </button>
                ))}
                <div className="flex items-center gap-1" style={{marginLeft:'auto'}}>
                  <span className="muted text-xs">All days:</span>
                  <input type="number" min="0.5" step="0.5" className="input input-sm" style={{width:60}}
                    placeholder="1"
                    onBlur={e=>{
                      const v=parseFloat(e.target.value)||1;
                      const u={}; curChs.forEach(ch=>{u[ch.id]={...chapCfg[ch.id],daysEstimate:v};});
                      setChapCfg(c=>({...c,...u}));
                    }} />
                </div>
              </div>

              {/* Chapter list */}
              {curChs.map(ch=>{
                const cfg = chapCfg[ch.id]||{};
                return (
                  <div key={ch.id} style={{background:'var(--s2)',border:'1px solid var(--bdr)',borderRadius:8,padding:'10px 12px',marginBottom:6}}>
                    <div style={{fontSize:13,fontWeight:500,marginBottom:8}}>{ch.name}</div>
                    <div className="flex gap-3 flex-wrap items-center">
                      <div className="track-btns">
                        {['study','revision','skip'].map(t=>(
                          <button key={t} className={`track-btn ${cfg.track===t?`active-${t}`:''}`}
                            onClick={()=>setChapCfg(c=>({...c,[ch.id]:{...c[ch.id],track:t}}))}>
                            {t==='study'?'📚 Study':t==='revision'?'🔄 Revision':'⏭️ Skip'}
                          </button>
                        ))}
                      </div>
                      <div className="flex items-center gap-1">
                        <span className="muted text-xs">Days:</span>
                        <input type="number" min="0.5" step="0.5" className="input input-sm"
                          style={{width:64}} value={cfg.daysEstimate||1}
                          onChange={e=>setChapCfg(c=>({...c,[ch.id]:{...c[ch.id],daysEstimate:parseFloat(e.target.value)||1}}))} />
                      </div>
                    </div>
                  </div>
                );
              })}
            </div>
          )}
        </div>

        <div className="wizard-footer">
          <div>
            {step===2 && (
              <span className="muted text-sm">{wizSubIdx+1}/{SUBJECTS.length} subjects configured</span>
            )}
          </div>
          <div className="flex gap-2">
            {step>0 && <button className="btn btn-ghost" onClick={()=>setStep(s=>s-1)}>← Back</button>}
            {step<2 && (
              <button className="btn btn-primary"
                disabled={step===0 && !examDate}
                onClick={()=>setStep(s=>s+1)}>
                Continue →
              </button>
            )}
            {step===2 && (
              <button className="btn btn-primary" onClick={finish}>
                Launch Planner 🚀
              </button>
            )}
          </div>
        </div>
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════════════════
   DASHBOARD TAB
═══════════════════════════════════════════════════════════ */
function Dashboard({ data, onUpdate }) {
  const { chapters, examDate, holidays, weaknesses, setupDate } = data;
  const onTrack   = getOnTrackStatus(chapters, examDate, holidays);
  const suggestions = getPrioritySuggestions(chapters, weaknesses||{}, examDate);

  const daysToExam = examDate ? Math.max(0, Math.ceil((new Date(examDate)-todayDate())/86400000)) : 0;

  const statusConfig = {
    'on-track':   { label:'On Track',    cls:'badge-green',  icon:'✅' },
    'slight-risk':{ label:'Slight Risk', cls:'badge-amber',  icon:'⚠️' },
    'behind':     { label:'Behind',      cls:'badge-red',    icon:'🔴' },
    'exam':       { label:'Exam Day!',   cls:'badge-accent', icon:'🎓' },
  };

  const sc = onTrack ? statusConfig[onTrack.status] : null;

  return (
    <div>
      {/* Top row */}
      <div className="content-grid grid-3" style={{marginBottom:18}}>
        {/* Countdown */}
        <div className="card card-inner" style={{textAlign:'center'}}>
          <div className="muted text-xs font-600" style={{letterSpacing:'1px',textTransform:'uppercase',marginBottom:6}}>Days to Exam</div>
          <div className="serif" style={{fontSize:56,fontWeight:800,lineHeight:1,color:'var(--accent)'}}>{daysToExam}</div>
          <div className="muted text-sm mt-1">{examDate || 'No date set'}</div>
        </div>

        {/* On-track */}
        <div className="card card-inner">
          <div className="muted text-xs font-600" style={{letterSpacing:'1px',textTransform:'uppercase',marginBottom:10}}>On-Track Status</div>
          {onTrack ? (
            <>
              <div className="flex items-center gap-2 mb-2">
                <span className={`badge ${sc.cls}`} style={{fontSize:13,padding:'5px 12px'}}>{sc.icon} {sc.label}</span>
              </div>
              <div className="muted text-sm">
                <span style={{color:'var(--txt)',fontWeight:600}}>{onTrack.remaining.toFixed(1)}</span> days of work left across <span style={{color:'var(--txt)',fontWeight:600}}>{onTrack.daysLeft}</span> working days
              </div>
              <div className="muted text-xs mt-1">
                Needed pace: <span style={{color:onTrack.paceNeeded>1?'var(--amber)':'var(--green)'}}>{onTrack.paceNeeded.toFixed(2)}×</span> per day
              </div>
              {/* Overall progress bar */}
              <div className="progress-track mt-2" style={{height:6}}>
                <div className="progress-fill" style={{width:`${onTrack.total?Math.round(onTrack.done/onTrack.total*100):0}%`,background:'var(--accent)'}} />
              </div>
              <div className="muted text-xs mt-1">{onTrack.total ? Math.round(onTrack.done/onTrack.total*100) : 0}% complete ({onTrack.done.toFixed(1)} / {onTrack.total.toFixed(1)} days)</div>
            </>
          ) : <div className="muted text-sm">Complete setup to see status.</div>}
        </div>

        {/* Today's stats summary */}
        <div className="card card-inner">
          <div className="muted text-xs font-600" style={{letterSpacing:'1px',textTransform:'uppercase',marginBottom:10}}>Today</div>
          <div style={{fontSize:13,color:'var(--txt)'}}>{new Date().toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long'})}</div>
          <div className="divider"/>
          {(() => {
            const done = Object.values(chapters).filter(c=>c.status==='done').length;
            const ip   = Object.values(chapters).filter(c=>c.status==='in-progress').length;
            const total= Object.values(chapters).filter(c=>c.track!=='skip').length;
            return (
              <>
                <div className="flex justify-between text-sm mt-1"><span className="muted">Done</span><span style={{color:'var(--green)',fontWeight:600}}>{done}</span></div>
                <div className="flex justify-between text-sm mt-1"><span className="muted">In Progress</span><span style={{color:'#6090d0',fontWeight:600}}>{ip}</span></div>
                <div className="flex justify-between text-sm mt-1"><span className="muted">Remaining</span><span style={{fontWeight:600}}>{total-done-ip}</span></div>
              </>
            );
          })()}
        </div>
      </div>

      {/* Suggestions */}
      <div className="card" style={{marginBottom:18}}>
        <div className="card-inner" style={{paddingBottom:0}}>
          <div className="flex justify-between items-center">
            <div className="serif" style={{fontSize:17,fontWeight:700}}>Today's Priority Suggestions</div>
            <span className="muted text-xs">Based on weakness & deadline pressure</span>
          </div>
        </div>
        <div style={{padding:'12px 18px 18px',display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(200px,1fr))',gap:10}}>
          {suggestions.length===0 && <div className="muted text-sm">All chapters complete or skipped 🎉</div>}
          {suggestions.map((ch,i)=>{
            const sub = SUBJECTS.find(s=>s.id===ch.subject);
            return (
              <div key={ch.id} className="suggestion-card" style={{borderLeftColor:sub?.color||'var(--accent)'}}>
                <div style={{fontSize:10,fontWeight:700,letterSpacing:'.8px',textTransform:'uppercase',color:sub?.color||'var(--accent)',marginBottom:4}}>
                  {sub?.name||ch.subject}
                </div>
                <div style={{fontSize:13,fontWeight:500,marginBottom:6}}>{ch.name}</div>
                <div className="flex gap-2 items-center">
                  <span className="badge badge-gray">{ch.daysEstimate||1}d est.</span>
                  {ch.progress>0 && <span className="badge badge-accent">{ch.progress}% done</span>}
                </div>
              </div>
            );
          })}
        </div>
      </div>

      {/* Subject balance */}
      <div className="card card-inner">
        <div className="serif" style={{fontSize:17,fontWeight:700,marginBottom:14}}>Subject Balance</div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'10px 30px'}}>
          {SUBJECTS.map(sub=>{
            const w = calcSubjectWork(chapters, sub.id);
            const pct = w.total ? Math.round(w.done/w.total*100) : 0;
            const weakness = (data.weaknesses||{})[sub.id]||50;
            return (
              <div key={sub.id} className="subject-balance-row">
                <div className="balance-label">
                  <div className="flex items-center gap-1">
                    <div style={{width:8,height:8,borderRadius:'50%',background:sub.color}} />
                    <span style={{fontSize:12}}>{sub.name}</span>
                    {weakness>=70 && <span style={{fontSize:10,color:'var(--red)'}}>⚠</span>}
                  </div>
                  <span style={{color:pct>=80?'var(--green)':pct>=40?'var(--amber)':'var(--muted)'}}>{pct}%</span>
                </div>
                <div className="balance-bar-bg" style={{height:7}}>
                  <div style={{height:'100%',borderRadius:3,background:sub.color,width:`${pct}%`,transition:'width .4s'}} />
                </div>
                <div className="flex justify-between text-xs muted mt-1">
                  <span>{w.done.toFixed(1)} / {w.total.toFixed(1)} days</span>
                  <span>Weakness: {weakness}%</span>
                </div>
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════════════════
   SYLLABUS TAB
═══════════════════════════════════════════════════════════ */
function Syllabus({ data, onUpdate }) {
  const { chapters } = data;
  const [search, setSearch]     = useState('');
  const [filter, setFilter]     = useState('all'); // all | subject id | track

  const filtered = useMemo(() => {
    const s = search.toLowerCase();
    return Object.entries(chapters).filter(([_, ch]) => {
      const matchSearch = !s || ch.name.toLowerCase().includes(s) || ch.subject.includes(s);
      const matchFilter = filter==='all' || ch.subject===filter ||
        (filter==='study' && ch.track==='study') ||
        (filter==='revision' && ch.track==='revision') ||
        (filter==='in-progress' && ch.status==='in-progress') ||
        (filter==='done' && ch.status==='done');
      return matchSearch && matchFilter;
    });
  }, [chapters, search, filter]);

  // Group by subject
  const grouped = useMemo(() => {
    const g = {};
    filtered.forEach(([id,ch]) => { (g[ch.subject]=g[ch.subject]||[]).push([id,ch]); });
    return g;
  }, [filtered]);

  return (
    <div>
      {/* Filter bar */}
      <div className="flex gap-2 items-center flex-wrap" style={{marginBottom:16}}>
        <input className="input" placeholder="🔍  Search chapters…" style={{maxWidth:260}}
          value={search} onChange={e=>setSearch(e.target.value)} />
        <div style={{display:'flex',flexWrap:'wrap',gap:5}}>
          {[{id:'all',name:'All'},
            {id:'study',name:'📚 Study'},
            {id:'revision',name:'🔄 Revision'},
            {id:'in-progress',name:'In Progress'},
            {id:'done',name:'Done'},
            ...SUBJECTS.map(s=>({id:s.id,name:s.name}))
          ].map(f=>(
            <button key={f.id} onClick={()=>setFilter(f.id)}
              style={{padding:'4px 11px',borderRadius:20,fontSize:12,fontWeight:600,cursor:'pointer',
                border:'1px solid', transition:'all .12s',
                background:filter===f.id?'var(--accent)':'transparent',
                borderColor:filter===f.id?'var(--accent)':'var(--bdr2)',
                color:filter===f.id?'#0a0c14':'var(--muted)'}}>
              {f.name}
            </button>
          ))}
        </div>
      </div>

      {/* Chapter list grouped by subject */}
      {SUBJECTS.filter(s=>grouped[s.id]?.length).map(sub=>(
        <div key={sub.id} style={{marginBottom:24}}>
          <div className="subject-section-header">
            <div className="subject-dot" style={{background:sub.color}} />
            <span>{sub.name}</span>
            <span className="muted text-sm serif" style={{fontWeight:400}}>— {sub.local}</span>
            <span className="muted text-xs" style={{marginLeft:'auto'}}>
              {calcSubjectWork(chapters,sub.id).done.toFixed(1)} / {calcSubjectWork(chapters,sub.id).total.toFixed(1)} days
            </span>
          </div>
          {grouped[sub.id].map(([id,ch])=>(
            <ChapterCard key={id} ch={ch} chId={id} subColor={sub.color}
              onUpdate={(chId,updates)=>onUpdate(chId,updates)} />
          ))}
        </div>
      ))}

      {filtered.length===0 && (
        <div className="empty-state">
          <div className="empty-icon">🔍</div>
          <div>No chapters match your filter.</div>
        </div>
      )}
    </div>
  );
}

/* ═══════════════════════════════════════════════════════════
   STATS TAB
═══════════════════════════════════════════════════════════ */
function Stats({ data }) {
  const { chapters, snapshots, examDate, setupDate, holidays } = data;
  const [showSubjects, setShowSubjects] = useState(false);
  const combinedData = buildBurnupData(chapters, snapshots, examDate, setupDate, holidays);

  // Session log: last 20 snapshots
  const logEntries = useMemo(() => {
    if (!snapshots) return [];
    return Object.entries(snapshots)
      .sort((a,b)=>b[0].localeCompare(a[0]))
      .slice(0,20)
      .map(([date,snap]) => ({ date, total: snap.total||0 }));
  }, [snapshots]);

  return (
    <div>
      {/* Combined burnup */}
      <div className="card card-inner" style={{marginBottom:18}}>
        <div className="serif" style={{fontSize:20,fontWeight:700,marginBottom:4}}>Overall Burnup Chart</div>
        <div className="muted text-sm" style={{marginBottom:14}}>Cumulative study days completed vs target pace</div>
        {combinedData
          ? <BurnupChart data={combinedData} color="#c8a96e" />
          : <div className="empty-state"><div className="empty-icon">📊</div><div>No data yet — start studying!</div></div>}
      </div>

      {/* Subject charts toggle */}
      <div className="card" style={{marginBottom:18}}>
        <div className="card-inner flex justify-between items-center cursor-pointer"
          onClick={()=>setShowSubjects(!showSubjects)}>
          <div className="serif" style={{fontSize:17,fontWeight:700}}>Per-Subject Charts ({SUBJECTS.length})</div>
          <button className="btn btn-ghost btn-sm">{showSubjects?'Collapse ▲':'Expand ▼'}</button>
        </div>
        {showSubjects && (
          <div style={{padding:'0 18px 18px',display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(320px,1fr))',gap:18}}>
            {SUBJECTS.map(sub=>{
              const sd = buildSubjectBurnupData(chapters,snapshots,examDate,setupDate,holidays,sub.id);
              if (!sd || !sd.total) return (
                <div key={sub.id} style={{background:'var(--s2)',borderRadius:8,padding:14}}>
                  <div style={{fontSize:13,fontWeight:600,color:sub.color,marginBottom:6}}>{sub.name}</div>
                  <div className="muted text-xs">No active chapters</div>
                </div>
              );
              return (
                <div key={sub.id} style={{background:'var(--s2)',borderRadius:8,padding:14}}>
                  <div style={{fontSize:13,fontWeight:700,color:'#fff',marginBottom:2}}>{sub.name}
                    <span className="muted text-xs" style={{marginLeft:6}}>{sub.local}</span>
                  </div>
                  <div className="muted text-xs" style={{marginBottom:8}}>
                    {calcSubjectWork(chapters,sub.id).done.toFixed(1)} / {sd.total.toFixed(1)} days
                  </div>
                  <BurnupChart data={sd} color={sub.color} />
                </div>
              );
            })}
          </div>
        )}
      </div>

      {/* Session log */}
      <div className="card card-inner">
        <div className="serif" style={{fontSize:17,fontWeight:700,marginBottom:12}}>Session Log</div>
        {logEntries.length===0 ? (
          <div className="muted text-sm">No sessions recorded yet.</div>
        ) : (
          <div style={{overflowX:'auto'}}>
            <table className="log-table">
              <thead>
                <tr>
                  <th>Date</th>
                  <th>Total Work Completed (days)</th>
                  <th>Daily Change</th>
                </tr>
              </thead>
              <tbody>
                {logEntries.map((e,i)=>{
                  const prev = logEntries[i+1];
                  const delta = prev ? e.total - prev.total : e.total;
                  return (
                    <tr key={e.date}>
                      <td>{e.date}</td>
                      <td>{e.total.toFixed(2)}</td>
                      <td style={{color:delta>0?'var(--green)':delta<0?'var(--red)':'var(--muted)'}}>
                        {delta>0?'+':''}{delta.toFixed(2)}
                      </td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
        )}
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════════════════
   SETTINGS TAB
═══════════════════════════════════════════════════════════ */
function Settings({ data, onSave }) {
  const [examDate, setExamDate]     = useState(data.examDate||'');
  const [holidays, setHolidays]     = useState(data.holidays||[]);
  const [weaknesses, setWeaknesses] = useState(data.weaknesses||{});
  const [newHoliday, setNewHoliday] = useState('');
  const [saved, setSaved]           = useState(false);

  const save = () => {
    onSave({ ...data, examDate, holidays, weaknesses });
    setSaved(true);
    setTimeout(()=>setSaved(false), 2000);
  };

  const addHoliday = () => {
    if (!newHoliday || holidays.includes(newHoliday)) return;
    setHolidays(h=>[...h,newHoliday].sort());
    setNewHoliday('');
  };

  return (
    <div style={{maxWidth:680}}>
      {/* Exam date */}
      <div className="card card-inner" style={{marginBottom:18}}>
        <div className="serif" style={{fontSize:17,fontWeight:700,marginBottom:14}}>Exam Date</div>
        <input type="date" className="input" value={examDate} onChange={e=>setExamDate(e.target.value)} style={{maxWidth:240}} />
        <div className="muted text-xs mt-1">Changing this recalculates all projections instantly.</div>
      </div>

      {/* Holidays */}
      <div className="card card-inner" style={{marginBottom:18}}>
        <div className="serif" style={{fontSize:17,fontWeight:700,marginBottom:4}}>Blocked Days / Holidays</div>
        <div className="muted text-sm" style={{marginBottom:12}}>These days are excluded from working day calculations (Eid, family events, etc.)</div>
        <div className="flex gap-2 items-center" style={{marginBottom:12}}>
          <input type="date" className="input" style={{maxWidth:200}} value={newHoliday} onChange={e=>setNewHoliday(e.target.value)} />
          <button className="btn btn-ghost btn-sm" onClick={addHoliday}>+ Add</button>
        </div>
        <div style={{minHeight:32}}>
          {holidays.length===0 && <span className="muted text-sm">No blocked days added.</span>}
          {holidays.map(h=>(
            <span key={h} className="holiday-tag">
              {h}
              <span className="holiday-remove" onClick={()=>setHolidays(hs=>hs.filter(x=>x!==h))}>×</span>
            </span>
          ))}
        </div>
      </div>

      {/* Weakness sliders */}
      <div className="card card-inner" style={{marginBottom:18}}>
        <div className="serif" style={{fontSize:17,fontWeight:700,marginBottom:4}}>Subject Weakness</div>
        <div className="muted text-sm" style={{marginBottom:16}}>Higher % = higher priority in daily suggestions.</div>
        {SUBJECTS.map(sub=>(
          <div key={sub.id} style={{marginBottom:16}}>
            <div className="flex justify-between items-center" style={{marginBottom:5}}>
              <div className="flex items-center gap-1">
                <div style={{width:9,height:9,borderRadius:'50%',background:sub.color}} />
                <span style={{fontSize:13,fontWeight:600}}>{sub.name}</span>
              </div>
              <span style={{fontSize:13,fontWeight:700,color:
                (weaknesses[sub.id]||50)>=70?'var(--red)':(weaknesses[sub.id]||50)>=40?'var(--amber)':'var(--green)'
              }}>{weaknesses[sub.id]||50}%</span>
            </div>
            <input type="range" min="0" max="100" step="5" className="slider"
              value={weaknesses[sub.id]||50}
              onChange={e=>setWeaknesses(w=>({...w,[sub.id]:Number(e.target.value)}))} />
          </div>
        ))}
      </div>

      <button className="btn btn-primary" onClick={save} style={{minWidth:160}}>
        {saved ? '✓ Saved!' : 'Save Settings'}
      </button>
    </div>
  );
}

/* ═══════════════════════════════════════════════════════════
   MAIN APP
═══════════════════════════════════════════════════════════ */
function MainApp({ data, onSave, syncing, onSignOut }) {
  const [tab, setTab] = useState('dashboard');

  const updateChapter = useCallback((chId, updates) => {
    const newChapters = {
      ...data.chapters,
      [chId]: { ...data.chapters[chId], ...updates }
    };
    const snap = takeSnapshot(newChapters);
    const newSnapshots = { ...(data.snapshots||{}), [todayStr()]: snap };
    onSave({ ...data, chapters: newChapters, snapshots: newSnapshots });
  }, [data, onSave]);

  const daysLeft = data.examDate
    ? Math.max(0, Math.ceil((new Date(data.examDate)-todayDate())/86400000))
    : '?';

  const onTrack = getOnTrackStatus(data.chapters||{}, data.examDate, data.holidays||[]);
  const scMap = { 'on-track':'badge-green','slight-risk':'badge-amber','behind':'badge-red','exam':'badge-accent' };

  return (
    <div style={{display:'flex',flexDirection:'column',height:'100vh',overflow:'hidden'}}>
      {/* Header */}
      <div className="app-header">
        <div>
          <div className="header-title">SSC Planner</div>
          <div className="muted text-xs">{data.examDate||'No exam date'}</div>
        </div>
        <div className="flex items-center gap-4">
          <div className="header-countdown">
            <div className="countdown-num">{daysLeft}</div>
            <div className="countdown-label">days left</div>
          </div>
          {onTrack && (
            <span className={`badge ${scMap[onTrack.status]}`} style={{display:'none'}}>
              {onTrack.status}
            </span>
          )}
          <div className="flex items-center gap-2">
            <div className={`sync-dot ${syncing?'syncing':''}`} title={syncing?'Syncing…':'Synced'} />
            <button className="btn btn-ghost btn-xs" onClick={onSignOut}>Sign Out</button>
          </div>
        </div>
      </div>

      {/* Tab nav */}
      <div className="tab-nav">
        {[
          {id:'dashboard',label:'📊 Dashboard'},
          {id:'syllabus', label:'📚 Syllabus'},
          {id:'stats',    label:'📈 Stats'},
          {id:'settings', label:'⚙️ Settings'},
        ].map(t=>(
          <button key={t.id} className={`tab-btn ${tab===t.id?'active':''}`}
            onClick={()=>setTab(t.id)}>{t.label}</button>
        ))}
      </div>

      {/* Content */}
      <div className="tab-content">
        {tab==='dashboard' && <Dashboard data={data} onUpdate={updateChapter} />}
        {tab==='syllabus'  && <Syllabus  data={data} onUpdate={updateChapter} />}
        {tab==='stats'     && <Stats     data={data} />}
        {tab==='settings'  && <Settings  data={data} onSave={onSave} />}
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════════════════
   ROOT APP
═══════════════════════════════════════════════════════════ */
function App() {
  const [authState, setAuthState] = useState('loading');
  const [user,      setUser]      = useState(null);
  const [appData,   setAppData]   = useState(null);
  const [syncing,   setSyncing]   = useState(false);
  const saveTimer = useRef(null);

  // Auth listener
  useEffect(() => {
    if (configError || !auth) { setAuthState('config-error'); return; }
    return auth.onAuthStateChanged(u => {
      setUser(u);
      setAuthState(u ? 'signed-in' : 'signed-out');
    });
  }, []);

  // Firestore real-time listener
  useEffect(() => {
    if (!user || !db) return;
    const unsub = db.collection('plans').doc(user.uid).onSnapshot(snap => {
      setAppData(snap.exists ? snap.data() : { setupComplete: false });
    }, err => console.error('Firestore error:', err));
    return unsub;
  }, [user]);

  // Debounced save
  const saveData = useCallback((newData) => {
    if (!user || !db) return;
    setAppData(newData);
    if (saveTimer.current) clearTimeout(saveTimer.current);
    saveTimer.current = setTimeout(() => {
      setSyncing(true);
      db.collection('plans').doc(user.uid)
        .set(newData)
        .catch(console.error)
        .finally(() => setSyncing(false));
    }, 800);
  }, [user]);

  const signIn  = () => auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()).catch(console.error);
  const signOut = () => { auth.signOut(); setAppData(null); };

  if (authState==='loading')       return <LoadingScreen msg="Connecting to Firebase…" />;
  if (authState==='config-error')  return <ConfigError />;
  if (authState==='signed-out')    return <SignInScreen onSignIn={signIn} />;
  if (!appData)                    return <LoadingScreen msg="Loading your study plan…" />;
  if (!appData.setupComplete)      return (
    <SetupWizard onComplete={d => saveData({ ...d, setupComplete:true, userId:user.uid })} />
  );
  return (
    <MainApp data={appData} onSave={saveData} syncing={syncing} onSignOut={signOut} />
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
